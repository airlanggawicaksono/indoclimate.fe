# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name chat.indoclimate.id;

    return 302 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.indoclimate.id;

    ssl_certificate /etc/letsencrypt/live/chat.indoclimate.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.indoclimate.id/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/chat.indoclimate.id/chain.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Increase buffer sizes for large responses
    client_max_body_size 10M;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Logging
    access_log /var/log/nginx/indoclimate-access.log;
    error_log /var/log/nginx/indoclimate-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Main proxy location - handles all requests to the Next.js app
    location / {
        proxy_pass http://127.0.0.1:5324;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Essential headers for connection tracking and user identification
        proxy_set_header X-Real-IP $remote_addr;              # Real client IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Client IP chain
        proxy_set_header X-Forwarded-Proto $scheme;          # HTTP/HTTPS scheme
        proxy_set_header X-Forwarded-Host $host;             # Original host
        proxy_set_header X-Original-Forwarded-For $http_x_forwarded_for;  # Preserve original X-Forwarded-For header

        # SSE (Server-Sent Events) support for streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Prevent buffering that might interfere with streaming
        proxy_redirect off;
    }

    # Static files (Next.js _next) - serve directly if available in the frontend directory
    location /_next/static {
        alias /var/www/html/indoclimate.fe/_next/static;
        
        # Fallback to backend if not found in static directory
        error_page 404 = @backend;
    }

    # API routes and other dynamic content - proxy to Next.js app
    location ~ ^/(api|_next/static|_next/data|static|favicon\.ico|robots\.txt) {
        proxy_pass http://127.0.0.1:5324;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # SSE support for streaming APIs
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Static assets - serve from frontend directory with fallback
    location /images {
        alias /var/www/html/indoclimate.fe/images;
        
        # Fallback to backend if not found in static directory
        error_page 404 = @backend;
    }

    location /static {
        alias /var/www/html/indoclimate.fe/static;
        
        # Fallback to backend if not found in static directory
        error_page 404 = @backend;
    }

    # Fallback to backend for all other requests
    location @backend {
        proxy_pass http://127.0.0.1:5324;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
